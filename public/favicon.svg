<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#g)"/>
  <!-- Skull shape -->
  <g transform="translate(256,240) scale(3.2)" fill="#f5f0e0" stroke="#1a1a3e" stroke-width="2.5" stroke-linejoin="round">
    <!-- Cranium -->
    <path d="M0-65 C-40-65 -65-45 -65-10 C-65 15 -55 30 -45 38 L-45 50 C-45 55 -40 58 -30 58 L30 58 C40 58 45 55 45 50 L45 38 C55 30 65 15 65-10 C65-45 40-65 0-65 Z" fill="#f5f0e0"/>
    <!-- Left eye -->
    <ellipse cx="-22" cy="-5" rx="14" ry="16" fill="#1a1a3e"/>
    <!-- Right eye -->
    <ellipse cx="22" cy="-5" rx="14" ry="16" fill="#1a1a3e"/>
    <!-- Nose -->
    <path d="M-5 18 L0 28 L5 18 Z" fill="#1a1a3e"/>
    <!-- Teeth -->
    <line x1="-20" y1="42" x2="-20" y2="56" stroke="#1a1a3e" stroke-width="2"/>
    <line x1="-10" y1="42" x2="-10" y2="56" stroke="#1a1a3e" stroke-width="2"/>
    <line x1="0" y1="42" x2="0" y2="56" stroke="#1a1a3e" stroke-width="2"/>
    <line x1="10" y1="42" x2="10" y2="56" stroke="#1a1a3e" stroke-width="2"/>
    <line x1="20" y1="42" x2="20" y2="56" stroke="#1a1a3e" stroke-width="2"/>
    <!-- Jaw line -->
    <line x1="-30" y1="42" x2="30" y2="42" stroke="#1a1a3e" stroke-width="2.5"/>
  </g>
</svg>
